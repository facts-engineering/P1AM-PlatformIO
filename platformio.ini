; P1AM PlatformIO Package
; Supports P1AM-100 (SAMD21G18A) and P1AM-200 (SAMD51P20A)
; Custom board definitions live in the ./boards/ directory and are
; picked up automatically by PlatformIO.
;
; Usage:
;   pio run -e p1am_100            ; build for P1AM-100
;   pio run -e p1am_200            ; build for P1AM-200
;   pio run -e p1am_100 -t upload  ; upload to P1AM-100
;   pio run -e p1am_200 -t upload  ; upload to P1AM-200
;   pio device monitor             ; open serial monitor

[platformio]
default_envs = p1am_100, p1am_200

; ─── Shared settings ──────────────────────────────────────────────────────────
; Pin atmelsam to 8.2.x for predictable package resolution (8.3+ had been a
; moving target vs. custom board JSON).
[env]
platform = atmelsam@8.2.0
framework = arduino
lib_deps =
    facts-engineering/P1AM @ ^1.0.9
lib_ldf_mode = deep+
monitor_speed = 115200

; ─── P1AM-100  (ATSAMD21G18A · 48 MHz · 256 KB flash · 32 KB RAM) ─────────
; FACTS P1AMCore + variants/P1AM-100 (not stock MKR Zero pin map).
[env:p1am_100]
board = p1am_100
platform_packages =
    framework-arduino-samd @ https://github.com/facts-engineering/P1AMCore.git
build_flags =
    -DP1AM_100

; ─── P1AM-200  (ATSAMD51P20A · 120 MHz · 1 MB flash · 256 KB RAM) ──────────
; FACTS fork of Adafruit SAMD core + variants/P1AM-200 (SPI2, correct GPIO map).
; SPI in this core includes Adafruit_ZeroDMA.h (not bundled; add from the registry).
[env:p1am_200]
board = p1am_200
platform_packages =
    framework-arduino-samd-adafruit @ https://github.com/facts-engineering/ArduinoCore-samd.git#add-platformio-package
lib_deps =
    facts-engineering/P1AM @ ^1.0.9
    adafruit/Adafruit Zero DMA Library
build_flags =
    -DP1AM_200
